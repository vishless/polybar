[bar/primary]
monitor = ${env:MONITOR_PRIMARY:DP-0}
width = 100%
height = 36
background = #1e1e2e
foreground = #cdd6f4
enable-ipc = true
enable-struts = true
cursor-click = pointer
override-redirect = false
wm-restack = i3
font-0 = "MesloLGS Nerd Font Mono:size=12;0"
font-1 = "MesloLGS Nerd Font Mono:size=18;2"
module-margin = 1
modules-left = xworkspaces xwindow
modules-center =
modules-right = claude gmail pulseaudio cpu gpu memory filesystem eth date

[bar/secondary]
monitor = ${env:MONITOR_SECONDARY:HDMI-0}
width = 100%
height = 28
background = #1e1e2e
foreground = #cdd6f4
enable-ipc = true
enable-struts = true
cursor-click = pointer
font-0 = "MesloLGS Nerd Font Mono:size=10;0"
font-1 = "MesloLGS Nerd Font Mono:size=14;1"
module-margin = 1
modules-left = xworkspaces
modules-right = tray

[module/xworkspaces]
type = internal/xworkspaces
enable-click = true
pin-workspaces = true
icon-1 = 1;¾▒üÉ
icon-2 = 2;¾░Ā«
icon-3 = 3;ŅØģ
icon-4 = 4;Ņ╗┤
icon-5 = 5;¾▒üÉ
icon-6 = 6;¾▒üÉ
icon-7 = 7;Ņ×Ģ
icon-8 = 8;¾░Ö©
icon-9 = 9;’ćŹ
icon-0 = 10;¾▒üÉ
icon-default = ’äæ
label-active = %{T2}%icon%%{T-} %name%
label-occupied = %{T2}%icon%%{T-} %name%
label-urgent = %{T2}%icon%%{T-} %name%
label-empty = %{T2}%icon%%{T-} %name%
label-active-padding = 1
label-occupied-padding = 1
label-urgent-padding = 1
label-empty-padding = 1

[module/xwindow]
type = custom/script
exec = xprop -id $(xprop -root _NET_ACTIVE_WINDOW | awk '{print $5}') _NET_WM_NAME 2>/dev/null | cut -d'"' -f2 | sed 's/ ŌĆö / - /g' | awk -F' - ' '{print $NF}'
interval = 1

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
format-volume = %{T2}¾░ĢŠ%{T-} <label-volume>
label-volume = %percentage%%
label-muted = %{T2}¾░Ø¤%{T-} muted
click-right = pavucontrol
click-middle = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

[module/eth]
type = custom/script
exec = ~/.config/polybar/scripts/network.sh
interval = 2

[module/cpu]
type = internal/cpu
interval = 2
warn-value = 90
format = %{T2}’ŗø%{T-} <label>
format-warn = %{T2}’ŗø%{T-} <label-warn>
label = %percentage:2%%
label-warn = %percentage:2%%
label-warn-foreground = #f38ba8
click-left = notify-send "CPU clicked"

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu.sh
interval = 2
format = %{T2}¾░┐Ą%{T-} <label>

[module/memory]
type = internal/memory
interval = 2
warn-value = 90
format = %{T2}¾░śÜ%{T-} <label>
format-warn = %{T2}¾░śÜ%{T-} <label-warn>
label = %percentage_used:2%%
label-warn = %percentage_used:2%%
label-warn-foreground = #f38ba8

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /
warn-percentage = 90
format-mounted = %{T2}’éĀ%{T-} <label-mounted>
format-warn = %{T2}’éĀ%{T-} <label-warn>
label-mounted = %percentage_used:2%%
label-warn = %percentage_used:2%%
label-warn-foreground = #f38ba8

[module/date]
type = internal/date
interval = 1
date = %a, %b %d
time = %H:%M
label = %{T2}’ü│%{T-} %date% %{T2}’ĆŚ%{T-} %time%
format = %{A1:~/.config/polybar/scripts/toggle-calendar.sh:}<label>%{A}

[module/claude]
type = custom/script
exec = ~/.config/polybar/scripts/claude-usage.sh
interval = 10
format = %{T2}¾░¤ł%{T-} <label>

[module/gmail]
type = custom/script
exec = ~/.config/polybar/scripts/gmail.sh
interval = 60

[module/tray]
type = internal/tray
