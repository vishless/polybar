[bar/primary]
monitor = ${env:MONITOR_PRIMARY:DP-0}
width = 100%
height = 36
background = #1e1e2e
foreground = #cdd6f4
enable-ipc = true
enable-struts = true
cursor-click = pointer
override-redirect = false
wm-restack = i3
font-0 = "MesloLGS Nerd Font Mono:size=12;0"
font-1 = "MesloLGS Nerd Font Mono:size=16;0"
module-margin = 1
modules-left = xworkspaces
modules-center = xwindow
modules-right = eth claude gmail pulseaudio cpu gpu memory filesystem date

[bar/secondary]
monitor = ${env:MONITOR_SECONDARY:HDMI-0}
width = 100%
height = 28
background = #1e1e2e
foreground = #cdd6f4
enable-ipc = true
enable-struts = true
cursor-click = pointer
font-0 = "MesloLGS Nerd Font Mono:size=10;0"
font-1 = "MesloLGS Nerd Font Mono:size=16;0"
module-margin = 1
modules-left = xworkspaces
modules-right = tray

[module/xworkspaces]
type = internal/xworkspaces
enable-click = true
pin-workspaces = true
icon-1 = 1;󱁐
icon-2 = 2;󰠮
icon-3 = 3;
icon-4 = 4;
icon-5 = 5;󱁐
icon-6 = 6;󱁐
icon-7 = 7;
icon-8 = 8;󰙨
icon-9 = 9;
icon-0 = 10;󱁐
icon-default = 
label-active = %{T2}%icon%%{T-} %name%
label-occupied = %{T2}%icon%%{T-} %name%
label-urgent = %{T2}%icon%%{T-} %name%
label-empty = %{T2}%icon%%{T-} %name%
label-active-padding = 1
label-occupied-padding = 1
label-urgent-padding = 1
label-empty-padding = 1

[module/xwindow]
type = custom/script
exec = xprop -id $(xprop -root _NET_ACTIVE_WINDOW | awk '{print $5}') _NET_WM_NAME 2>/dev/null | cut -d'"' -f2 | sed 's/ — / - /g' | awk -F' - ' '{print $NF}'
interval = 1

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = false
format-volume = %{T2}󰕾%{T-} <label-volume>
label-volume = %percentage%%
label-muted = %{T2}󰝟%{T-} muted
click-right = pavucontrol
click-middle = wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

[module/eth]
type = custom/script
exec = ~/.config/polybar/scripts/network.sh
interval = 2

[module/cpu]
type = internal/cpu
interval = 2
format = %{T2}%{T-} <label>
label = %percentage%%
click-left = notify-send "CPU clicked"

[module/gpu]
type = custom/script
exec = ~/.config/polybar/scripts/gpu.sh
interval = 2
format = %{T2}󰿵%{T-} <label>

[module/memory]
type = internal/memory
interval = 2
format = %{T2}󰘚%{T-} <label>
label = %percentage_used%%

[module/filesystem]
type = internal/fs
interval = 30
mount-0 = /
format-mounted = %{T2}%{T-} <label-mounted>
label-mounted = %percentage_used%%

[module/date]
type = internal/date
interval = 1
date = %a, %b %d
time = %H:%M
label = %{T2}%{T-} %date% %{T2}%{T-} %time%
format = %{A1:~/.config/polybar/scripts/toggle-calendar.sh:}<label>%{A}
format-padding = 1

[module/claude]
type = custom/script
exec = ~/.config/polybar/scripts/claude-usage.sh
interval = 10
format = %{T2}󱨶%{T-} <label>

[module/gmail]
type = custom/script
exec = ~/.config/polybar/scripts/gmail.sh
interval = 60

[module/tray]
type = internal/tray
